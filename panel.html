<!doctype html>
<html lang="es">
  <head>
    <title>Media Control Panel</title>
    <meta charset="UTF-8" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .main {
        font-family: Arial, Helvetica, sans-serif;

        --button-gaps: 5px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: var(--button-gaps);
        background: transparent;
        margin: 0;
        max-width: 450px;
      }

      .button-container {
        display: flex;
        gap: var(--button-gaps);
      }

      #media-info {
        color: #e6e6e6;
        display: flex;
        flex-direction: column;
        align-items: center;

        padding: 1rem;

        p {
          text-wrap: wrap;
          margin: 1rem 0px 0px 0px;
        }
      }

      #thumbnail {
        aspect-ratio: 1 / 1;
        width: 150px;
        height: 150px;
        object-fit: contain;
        background-color: rgba(255, 255, 255, 0.07);
      }

      button {
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        transition: background 0.2s;

        svg {
          --size: 24px;
          width: var(--size);
          height: var(--size);
          fill: #e6e6e6;
        }
      }

      button:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      button:active {
        transform: scale(0.95);
      }
    </style>

    <script>
      let currentTitle = "";
      let found_thumbnail = false;

      const PLAY_PAUSE_LOGO =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3,5V19L11,12M13,19H16V5H13M18,5V19H21V5" /></svg>';

      const PLAY_LOGO =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>';

      const PAUSE_LOGO =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14,19H18V5H14M6,19H10V5H6V19Z" /></svg>';

      function sendCmd(action) {
        fetch("/media/" + action, {
          method: "GET",
          // Marcador del token (reemplazado en Python)
          headers: { "X-Token": "__TOKEN_HERE__" },
        }).catch((err) => console.error("Error:", err));
      }

      function setBorderShadowThumbnail(thumbElement) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d", { willReadFrequently: true });

        thumbElement.onload = () => {
          const width = (canvas.width = 100);
          const height = (canvas.height = 100);

          context.drawImage(thumbElement, 0, 0, width, height);
          const thumbData = context.getImageData(0, 0, width, height).data;

          let r = 0,
            g = 0,
            b = 0,
            count = 0;

          for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
              // Only count border pixels
              if (x === 0 || y === width - 1 || y === 0 || y === height - 1) {
                // Index because data is an Array with RGBA values
                const i = (y * width + x) * 4;
                r += thumbData[i];
                g += thumbData[i + 1];
                b += thumbData[i + 2];
                count++;
              }
            }
          }

          r = Math.floor(r / count);
          g = Math.floor(g / count);
          b = Math.floor(b / count);

          thumbElement.style.boxShadow = `0px 0px 12px 4px rgb(${r}, ${g}, ${b})`;
        };
      }

      async function getMediaInfo() {
        const res = await fetch("/media/info");
        const data = await res.json();

        const title_element = document.getElementById("title-text");
        const artist_element = document.getElementById("artist-text");
        const thumbnail_element = document.getElementById("thumbnail");
        const play_btn = document.getElementById("play-btn");

        if (data.status === "inactive") {
          title_element.innerText = "No session yet";
          artist_element.innerText = "-";
          found_thumbnail = await setThumbnailSrc(thumbnail_element);
          play_btn.innerHTML = PLAY_PAUSE_LOGO;
          currentTitle = "";
          return;
        }

        if (data.is_playing) {
          play_btn.innerHTML = PAUSE_LOGO;
        } else {
          play_btn.innerHTML = PLAY_LOGO;
        }

        if (data.title !== currentTitle) {
          currentTitle = data.title;
          title_element.innerText = data.title || "Unknown";
          artist_element.innerText = data.artist || "Unknown";
          found_thumbnail = await setThumbnailSrc(thumbnail_element);
        }

        if (!found_thumbnail) {
          found_thumbnail = await setThumbnailSrc(thumbnail_element);
        }
      }

      async function setThumbnailSrc(thumbnail_element) {
        let thumb_src = `/media/thumbnail?t=${Date.now()}`;
        let success = false;

        try {
          const res = await fetch(thumb_src);
          if (!res.ok) {
            thumb_src = "__DEFAULT_THUMB__";
            throw new Error("Error fetch thumbnail");
          }
          success = true;
        } catch (e) {
          thumb_src = "__DEFAULT_THUMB__";
          console.error("Error: ", e);
          success = false;
        }

        thumbnail_element.src = thumb_src;
        setBorderShadowThumbnail(thumbnail_element);
        return success;
      }

      async function loopGetMediaInfo() {
        try {
          await getMediaInfo();
        } catch (e) {
          console.log("ERROR: ", e);
        }
        setTimeout(loopGetMediaInfo, 1500);
      }

      window.onload = loopGetMediaInfo;
    </script>
  </head>
  <body>
    <div class="main">
      <div id="media-info">
        <img src="__DEFAULT_THUMB__" alt="thumbnail" id="thumbnail" />
        <p class="title"><strong id="title-text"></strong></p>
        <p id="artist"><strong id="artist-text"></strong></p>
      </div>

      <div class="button-container">
        <button onclick="sendCmd('prev')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z" />
          </svg>
        </button>

        <button onclick="sendCmd('play')" id="play-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M3,5V19L11,12M13,19H16V5H13M18,5V19H21V5" />
          </svg>
        </button>

        <button onclick="sendCmd('next')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z" />
          </svg>
        </button>
      </div>

      <div class="button-container">
        <button onclick="sendCmd('vol-down')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M3,9H7L12,4V20L7,15H3V9M14,11H22V13H14V11Z" />
          </svg>
        </button>

        <button onclick="sendCmd('mute')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="M3,9H7L12,4V20L7,15H3V9M16.59,12L14,9.41L15.41,8L18,10.59L20.59,8L22,9.41L19.41,12L22,14.59L20.59,16L18,13.41L15.41,16L14,14.59L16.59,12Z"
            />
          </svg>
        </button>

        <button onclick="sendCmd('vol-up')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="M3,9H7L12,4V20L7,15H3V9M14,11H17V8H19V11H22V13H19V16H17V13H14V11Z"
            />
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>

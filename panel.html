<!doctype html>
<html lang="es">
  <head>
    <title>Media Control Panel</title>
    <meta charset="UTF-8" />
    <style>
      body {
        --button-gaps: 5px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: var(--button-gaps);
        background: transparent;
        margin: 0;
        height: 100vh;

        div {
          display: flex;
          gap: var(--button-gaps);
        }
      }

      button {
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        transition: background 0.2s;

        svg {
          --size: 24px;
          width: var(--size);
          height: var(--size);
          fill: #e6e6e6;
        }
      }

      button:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      button:active {
        transform: scale(0.95);
      }
    </style>
    <script>
      function sendCmd(action) {
        fetch("/media/" + action, {
          method: "GET",
          // Marcador del token (reemplazado en Python)
          headers: { "X-Token": "__TOKEN_HERE__" },
        }).catch((err) => console.error("Error:", err));
      }
    </script>
  </head>
  <body>
    <div>
      <button onclick="sendCmd('prev')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z" />
        </svg>
      </button>

      <button onclick="sendCmd('play')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M3,5V19L11,12M13,19H16V5H13M18,5V19H21V5" />
        </svg>
      </button>

      <button onclick="sendCmd('next')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M16,18H18V6H16M6,18L14.5,12L6,6V18Z" />
        </svg>
      </button>
    </div>

    <div>
      <button onclick="sendCmd('vol-down')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M3,9H7L12,4V20L7,15H3V9M14,11H22V13H14V11Z" />
        </svg>
      </button>

      <button onclick="sendCmd('mute')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path
            d="M3,9H7L12,4V20L7,15H3V9M16.59,12L14,9.41L15.41,8L18,10.59L20.59,8L22,9.41L19.41,12L22,14.59L20.59,16L18,13.41L15.41,16L14,14.59L16.59,12Z"
          />
        </svg>
      </button>

      <button onclick="sendCmd('vol-up')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path
            d="M3,9H7L12,4V20L7,15H3V9M14,11H17V8H19V11H22V13H19V16H17V13H14V11Z"
          />
        </svg>
      </button>
    </div>
  </body>
</html>
